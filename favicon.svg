<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="5" fill="#003a5d"/>
  <!-- Fish body (faces left) -->
  <ellipse cx="13" cy="16" rx="8" ry="5.5" fill="#00b4c5"/>
  <!-- Dorsal fin -->
  <path d="M10 10.8 Q13.5 6.5 18 10.8" fill="#00b4c5"/>
  <!-- Caudal tail fin (right side) -->
  <path d="M19.5 11.5 L27.5 16 L19.5 20.5 Z" fill="#00b4c5"/>
  <!-- Gill line -->
  <path d="M11 11.5 C10.4 14 10.4 18 11 20.5" stroke="#003a5d" stroke-width="1.1" fill="none"/>
  <!-- Eye white -->
  <circle cx="7.8" cy="15.2" r="2" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="8.3" cy="15.2" r="1" fill="#003a5d"/>
</svg>
